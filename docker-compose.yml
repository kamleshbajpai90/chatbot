version: "3.9"

services:
  app:
    build: .
    container_name: chatbot-app
    ports:
      - "3000:3000"
    environment:
      # Connect to the MongoDB service defined below
      MONGODB_URI: mongodb://mongo:27017/chatbot
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    container_name: chatbot-db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
